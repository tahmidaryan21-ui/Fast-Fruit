<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; padding-bottom: 70px; }
        .post { padding: 15px; border-bottom: 8px solid #f5f5f5; }
        .user-info { display: flex; align-items: center; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; background: #4CAF50; border-radius: 50%; margin-right: 12px; color: white; display: flex; justify-content: center; align-items: center; }
        .post-img { width: 100%; border-radius: 15px; height: 350px; object-fit: cover; }
        .actions { padding: 12px 0; font-size: 18px; color: #333; }
        .actions i { margin-right: 20px; cursor: pointer; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-bottom i { font-size: 22px; color: #ccc; }
        .nav-bottom i.active { color: #000; }
    </style>
</head>
<body>
    <h3 style="text-align: center; padding: 15px; margin: 0; border-bottom: 1px solid #eee;">Feed</h3>
    <div class="post">
        <div class="user-info"><div class="avatar">Z</div><strong>Zahid FF</strong></div>
        <img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=600" class="post-img">
        <div class="actions">
            <i class="fa-regular fa-heart"></i> <i class="fa-regular fa-comment"></i> <i class="fa-regular fa-paper-plane"></i>
        </div>
        <p><b>256 Likes</b><br>Enjoying fresh green grapes today! 🍇</p>
    </div>
    <div class="nav-bottom">
        <i class="fa fa-home" onclick="location.href='home.html'"></i>
        <i class="fa fa-th-large active" onclick="location.href='gallery.html'"></i>
        <i class="fa fa-shopping-cart" onclick="location.href='checkout.html'"></i>
        <i class="fa fa-user" onclick="location.href='signin.html'"></i>
    </div>
</body>
</html>
