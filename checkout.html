<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; }
        .back-btn { font-size: 24px; cursor: pointer; margin-bottom: 20px; }
        .item { display: flex; align-items: center; margin-bottom: 20px; background: #fafafa; padding: 10px; border-radius: 12px; }
        .item img { width: 70px; height: 70px; border-radius: 10px; margin-right: 15px; }
        .item-info { flex-grow: 1; }
        .summary { border-top: 1px solid #eee; padding-top: 20px; margin-top: 30px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 12px; color: #666; }
        .total { font-size: 22px; font-weight: bold; color: #000; margin-top: 10px; }
        .btn-order { background: #000; color: #fff; width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="back-btn" onclick="location.href='home.html'">←</div>
    <h2>My Cart</h2>
    <div class="item">
        <img src="https://images.unsplash.com/photo-1557800636-894a64c1696f?w=400">
        <div class="item-info"><h4>Fresh Orange</h4><p>Quantity: 01</p></div>
        <b>$12.00</b>
    </div>
    <div class="item">
        <img src="https://images.unsplash.com/photo-1550258114-b838e9763c9c?w=400">
        <div class="item-info"><h4>Pineapple</h4><p>Quantity: 01</p></div>
        <b>$15.00</b>
    </div>
    <div class="summary">
        <div class="row"><span>Subtotal</span><b>$27.00</b></div>
        <div class="row"><span>Shipping Tax</span><b>$2.00</b></div>
        <div class="row total"><span>Total</span><span>$29.00</span></div>
        <button class="btn-order" onclick="alert('Congratulations! Order placed.')">Place Order</button>
    </div>
</body>
</html>
