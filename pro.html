<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Fruit | Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: #fff; color: #333; }
        
        /* Header & Search */
        .header { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: bold; letter-spacing: -0.5px; }
        .search-container { padding: 10px 20px; }
        .search-bar { background: #F3F4F6; padding: 12px 18px; border-radius: 12px; display: flex; align-items: center; }
        .search-bar input { border: none; background: transparent; outline: none; margin-left: 10px; width: 100%; font-size: 15px; }
        
        /* Banner */
        .banner { background: #FFF5F5; margin: 20px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #FFE4E4; }
        .banner-text h2 { margin: 0; font-size: 20px; color: #111; }
        .banner-text p { margin: 5px 0 0; color: #666; font-size: 14px; }
        .banner img { width: 80px; height: 80px; object-fit: contain; }

        /* Product Section */
        .section-header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .section-header b { font-size: 18px; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 20px; }
        .product-card { background: #FFFFFF; border: 1px solid #E5E7EB; padding: 12px; border-radius: 18px; text-align: left; }
        .product-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        .product-card h4 { margin: 5px 0; font-size: 15px; font-weight: 600; }
        .product-card span { color: #10B981; font-weight: bold; font-size: 14px; }

        /* Professional Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #F3F4F6; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-bar i { font-size: 22px; color: #9CA3AF; cursor: pointer; }
        .nav-bar i.active { color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Nexcent</div>
        <i class="fa-regular fa-bell"></i>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fa fa-search" style="color: #999;"></i>
            <input type="text" placeholder="Search fruits, grocery...">
        </div>
    </div>

    <div class="banner">
        <div class="banner-text">
            <h2>Fresh Pear</h2>
            <p>Get 20% Discount</p>
        </div>
        <img src="https://images.unsplash.com/photo-1514756331096-242f3900f811?w=200" alt="Pear">
    </div>

    <div class="section-header">
        <b>Popular Items</b>
        <i class="fa fa-chevron-right" style="font-size: 12px; color: #999;"></i>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1557800636-894a64c1696f?w=300" alt="Orange">
            <h4>Sweet Orange</h4>
            <span>$10.99</span>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1550258114-b838e9763c9c?w=300" alt="Pineapple">
            <h4>Pineapple</h4>
            <span>$15.50</span>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=300" alt="Grapes">
            <h4>Green Grapes</h4>
            <span>$12.00</span>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1589927986089-35812388d1f4?w=300" alt="Watermelon">
            <h4>Watermelon</h4>
            <span>$25.00</span>
        </div>
    </div>

    <div class="nav-bar">
        <i class="fa fa-home active"></i>
        <i class="fa fa-compass"></i>
        <i class="fa fa-shopping-cart"></i>
        <i class="fa fa-user"></i>
    </div>

</body>
</html>
