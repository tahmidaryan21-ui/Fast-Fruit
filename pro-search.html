<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast-Fruit | Smart Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: #fff; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Professional Header */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 22px; font-weight: 800; color: #10B981; }
        
        /* Search Bar Design */
        .search-container { padding: 0 20px 15px; }
        .search-bar { background: #F3F4F6; padding: 14px 20px; border-radius: 16px; display: flex; align-items: center; border: 1px solid transparent; transition: 0.3s; }
        .search-bar:focus-within { border-color: #10B981; background: #fff; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1); }
        .search-bar input { border: none; background: transparent; outline: none; margin-left: 12px; width: 100%; font-size: 16px; color: #374151; }

        /* Grid System */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 20px; }
        .card { background: #fff; padding: 12px; border-radius: 20px; border: 1px solid #F3F4F6; transition: 0.3s; animation: fadeIn 0.5s ease; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #f9f9f9; }
        .card h4 { margin: 0 0 5px; font-size: 16px; color: #1F2937; }
        .card p { color: #10B981; font-weight: 700; margin: 0; font-size: 15px; }
        
        /* No Result Message */
        #noResult { text-align: center; padding: 40px; color: #9CA3AF; display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid #F3F4F6; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-bar i { font-size: 22px; color: #D1D5DB; cursor: pointer; transition: 0.3s; }
        .nav-bar i.active { color: #10B981; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Nexcent</div>
        <div style="position: relative;">
            <i class="fa-regular fa-bell" style="font-size: 20px; color: #4B5563;"></i>
            <span style="position: absolute; top: -2px; right: -2px; background: #EF4444; width: 8px; height: 8px; border-radius: 50%;"></span>
        </div>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <i class="fa fa-search" style="color: #9CA3AF;"></i>
            <input type="text" id="mainSearch" placeholder="Search for any fruit..." onkeyup="smartSearch()">
        </div>
    </div>

    <div id="noResult">
        <i class="fa-regular fa-face-frown" style="font-size: 40px; margin-bottom: 10px;"></i>
        <p>Sorry, fruit not found!</p>
    </div>

    <div class="product-grid" id="fruitContainer">
        <div class="card" data-name="orange">
            <img src="https://images.unsplash.com/photo-1557800636-894a64c1696f?w=400" alt="Orange">
            <h4>Sweet Orange</h4>
            <p>$10.99</p>
        </div>
        <div class="card" data-name="apple">
            <img src="https://images.unsplash.com/photo-1560806887-1e4cd0b6bcd6?w=400" alt="Apple">
            <h4>Red Apple</h4>
            <p>$12.50</p>
        </div>
        <div class="card" data-name="pineapple">
            <img src="https://images.unsplash.com/photo-1550258114-b838e9763c9c?w=400" alt="Pineapple">
            <h4>Pineapple</h4>
            <p>$15.00</p>
        </div>
        <div class="card" data-name="grapes">
            <img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=400" alt="Grapes">
            <h4>Green Grapes</h4>
            <p>$8.99</p>
        </div>
        <div class="card" data-name="watermelon">
            <img src="https://images.unsplash.com/photo-1589927986089-35812388d1f4?w=400" alt="Watermelon">
            <h4>Watermelon</h4>
            <p>$20.00</p>
        </div>
        <div class="card" data-name="banana">
            <img src="https://images.unsplash.com/photo-1571771894821-ad9902d83f4e?w=400" alt="Banana">
            <h4>Fresh Banana</h4>
            <p>$5.50</p>
        </div>
    </div>

    <div class="nav-bar">
        <i class="fa fa-home active"></i>
        <i class="fa fa-compass"></i>
        <i class="fa fa-shopping-cart"></i>
        <i class="fa fa-user"></i>
    </div>

    <script>
        function smartSearch() {
            let input = document.getElementById('mainSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            let found = false;
            
            for (let i = 0; i < cards.length; i++) {
                let fruitName = cards[i].getAttribute('data-name');
                if (fruitName.includes(input)) {
                    cards[i].style.display = "block";
                    found = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            // যদি কোনো ফল খুঁজে না পাওয়া যায়
            let noResult = document.getElementById('noResult');
            if (!found && input !== "") {
                noResult.style.display = "block";
            } else {
                noResult.style.display = "none";
            }
        }
    </script>
</body>
</html>
