<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fff; text-align: center; }
        .container { width: 85%; max-width: 400px; }
        h1 { font-size: 35px; color: #4CAF50; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 40px; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; background: #f9f9f9; outline: none; }
        .btn-black { background: #000; color: #fff; width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .social-btn { border: 1px solid #eee; padding: 14px; border-radius: 12px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nexcent</h1>
        <h3>Join us today</h3>
        <p>Enter your email to get started</p>
        <input type="email" placeholder="Email Address">
        <button class="btn-black" onclick="location.href='home.html'">Continue</button>
        <div style="margin: 25px 0; color: #ccc;">or</div>
        <div class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Continue with Google</div>
        <div class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/888/888841.png" width="20"> Continue with Apple</div>
    </div>
</body>
</html>
